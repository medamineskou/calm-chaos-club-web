<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calm Chaos Club</title>
    <meta
      name="description"
      content="Calm Chaos Club: espace perso pour partager idees, philo, math, culture, sport, photos et articles."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body data-theme="light">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-wrap">
          <p class="brand-mini">Calm Chaos Club</p>
          <h1>Un feed pour penser, partager, archiver.</h1>
        </div>
        <div class="topbar-actions">
          <button id="themeToggle" class="btn ghost" type="button">Mode nuit</button>
        </div>
      </div>
    </header>

    <main class="page">
      <aside class="sidebar">
        <section class="panel">
          <h2>Explorer</h2>
          <input id="searchInput" type="search" placeholder="Rechercher dans les posts..." />
          <p class="label">Type</p>
          <div id="typeFilters" class="chips"></div>
          <p class="label">Tags</p>
          <div id="tagFilters" class="chips"></div>
          <button id="clearFiltersBtn" class="btn ghost full" type="button">Reinitialiser les filtres</button>
        </section>
      </aside>

      <section class="feed-area">
        <section id="listView" class="panel">
          <div class="feed-head">
            <h2>Fil des partages</h2>
            <p id="resultsMeta"></p>
          </div>
          <div id="cardsContainer" class="feed-list"></div>
        </section>

        <article id="detailView" class="panel hidden detail-view" aria-live="polite">
          <button id="backBtn" class="btn ghost" type="button">Retour au feed</button>
          <p id="detailMeta" class="meta"></p>
          <h2 id="detailTitle"></h2>
          <div id="detailTags" class="chips"></div>
          <div id="detailBody" class="detail-body">
            <img id="detailImage" class="detail-image hidden" alt="Illustration du post" />
            <div id="detailContent" class="rich-content"></div>
          </div>
          <div class="detail-actions">
            <button id="shareBtn" class="btn primary" type="button">Partager</button>
            <a id="sourceLink" class="btn ghost hidden" target="_blank" rel="noreferrer">Source</a>
          </div>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        Calm Chaos Club · heberge gratuitement sur GitHub Pages · edite ton contenu dans
        <code>assets/posts.js</code>
      </p>
    </footer>

    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
    <script defer src="./assets/posts.js?v=20260327-1"></script>
    <script defer src="./assets/app.js?v=20260327-1"></script>
  </body>
</html>
